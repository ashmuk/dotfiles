version: 1
character: toolbox

toolbox:
  backlog_file: BACKLOG.md
  shipping: continuous

# Toolbox projects are ad-hoc:
# - Multiple independent tools/plugins
# - Business-driven iterations
# - Each component can ship independently
# - Workflow scales to task size

github_issues:
  enabled: true              # Toggle for projects without GitHub remote
  auto_post: false             # Set to true to auto-post pipeline status to linked issues
  # TASKS.md is auto-generated by cc-issue-sync (grouped by status for toolbox projects)
  # BACKLOG.md remains manually authored for brainstorming and ideas
