version: 1
character: staged

staged:
  current_stage: 1
  deployment_gate: 5
  roadmap_file: PLANS.md

# Staged projects follow linear progression:
# Stage 1: Analysis (read-only)
# Stage 2: Asset collection
# Stage 3-4: Architecture & tech stack (ADRs)
# Stage 5: Implementation & deployment
# Stage 6+: Enhancement

github_issues:
  enabled: true              # Toggle for projects without GitHub remote
  auto_post: false             # Set to true to auto-post pipeline status to linked issues
  # TASKS.md is auto-generated by cc-issue-sync (grouped by milestone for staged projects)
  # PLANS.md remains manually authored for strategy and scope definitions
