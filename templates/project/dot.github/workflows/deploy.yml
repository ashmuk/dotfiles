name: Deploy

# TODO: Rename this workflow to match your deployment target,
#       e.g. "Deploy to AWS S3", "Deploy to Vercel", "Deploy to Fly.io".

on:
  # Manual trigger — useful for testing and rollbacks.
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          # - staging   # TODO: Uncomment and configure staging if needed.

  # Automatic trigger on push to main.
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    # TODO: Configure environment protection rules in GitHub repo settings
    #       (Settings > Environments) to require manual approval before production deploys.
    # environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TODO: Replace with your language/runtime setup.
      # Examples:
      #   Node.js:   actions/setup-node@v4
      #   Python:    actions/setup-python@v5
      #   Go:        actions/setup-go@v5
      - name: Set up runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # TODO: Replace with your package manager command.
        run: npm ci

      - name: Build
