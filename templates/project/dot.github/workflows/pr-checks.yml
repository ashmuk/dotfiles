name: PR Quality Checks

on:
  pull_request:
    branches:
      - main
      - develop
    # TODO: Narrow this filter to your project's relevant paths, e.g.:
    #   paths:
    #     - 'src/**'
    #     - 'package*.json'
    #     - '.github/workflows/**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_nodejs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_nodejs=false" >> "$GITHUB_OUTPUT"
          fi
          # TODO: Add detection for other runtimes as needed, e.g.:
          #   [ -f requirements.txt ] && echo "has_python=true" >> "$GITHUB_OUTPUT"
          #   [ -f go.mod ] && echo "has_go=true" >> "$GITHUB_OUTPUT"

      # TODO: Replace with your language/runtime setup.
      # Examples:
      #   Node.js:   actions/setup-node@v4  (with node-version and cache: 'npm')
      #   Python:    actions/setup-python@v5
      #   Go:        actions/setup-go@v5
      #   Java:      actions/setup-java@v4
      - name: Set up runtime
        if: steps.detect.outputs.has_nodejs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # cache-dependency-path: path/to/package-lock.json

      - name: Install dependencies
        if: steps.detect.outputs.has_nodejs == 'true'
        # TODO: Replace with your package manager command (npm ci, yarn install, pip install, etc.)
        run: npm ci

      - name: Build
        if: steps.detect.outputs.has_nodejs == 'true'
        # TODO: Replace with your build command (npm run build, make build, go build, etc.)
        run: npm run build

      # TODO: Uncomment and set path to upload build artifacts.
      # - name: Upload build artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build-output
      #     path: dist/   # TODO: Set to your build output directory
      #     retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_nodejs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_nodejs=false" >> "$GITHUB_OUTPUT"
          fi
          # TODO: Add detection for other runtimes as needed, e.g.:
          #   [ -f requirements.txt ] && echo "has_python=true" >> "$GITHUB_OUTPUT"
          #   [ -f go.mod ] && echo "has_go=true" >> "$GITHUB_OUTPUT"

      - name: Set up runtime
        if: steps.detect.outputs.has_nodejs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.detect.outputs.has_nodejs == 'true'
        run: npm ci

      - name: Run lint
        if: steps.detect.outputs.has_nodejs == 'true'
        # TODO: Replace with your lint command.
        # Common examples:
        #   npm run lint
        #   npx eslint .
        #   flake8 .
        #   golangci-lint run
        run: |
          # TODO: Add your lint command here
          echo "No lint command configured. Add one to enforce code style."

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_nodejs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_nodejs=false" >> "$GITHUB_OUTPUT"
          fi
          # TODO: Add detection for other runtimes as needed, e.g.:
          #   [ -f requirements.txt ] && echo "has_python=true" >> "$GITHUB_OUTPUT"
          #   [ -f go.mod ] && echo "has_go=true" >> "$GITHUB_OUTPUT"

      - name: Set up runtime
        if: steps.detect.outputs.has_nodejs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.detect.outputs.has_nodejs == 'true'
        run: npm ci

      - name: Run tests
        if: steps.detect.outputs.has_nodejs == 'true'
        # TODO: Replace with your test command.
        # Common examples:
        #   npm test
        #   pytest
        #   go test ./...
        #   cargo test
        run: |
          # TODO: Add your test command here
          echo "No test command configured. Add one to enforce test coverage."

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "has_nodejs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_nodejs=false" >> "$GITHUB_OUTPUT"
          fi
          # TODO: Add detection for other runtimes as needed, e.g.:
          #   [ -f requirements.txt ] && echo "has_python=true" >> "$GITHUB_OUTPUT"
          #   [ -f go.mod ] && echo "has_go=true" >> "$GITHUB_OUTPUT"

      - name: Set up runtime
        if: steps.detect.outputs.has_nodejs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.detect.outputs.has_nodejs == 'true'
        run: npm ci

      - name: Run type check
        if: steps.detect.outputs.has_nodejs == 'true'
        # TODO: Replace with your type check command.
        # Common examples:
        #   npx tsc --noEmit          (TypeScript / plain)
        #   npx tsc --noEmit          (Next.js, Vite, etc.)
        #   mypy src/                 (Python)
        run: |
          # TODO: Add your type check command here
          echo "No type check command configured."

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [build, lint, test, type-check]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## PR Quality Checks Summary"
          echo ""
          echo "Build:      ${{ needs.build.result }}"
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Test:       ${{ needs.test.result }}"
          echo "Type check: ${{ needs.type-check.result }}"
          echo ""
          failed=false
          for result in \
            "${{ needs.build.result }}" \
            "${{ needs.lint.result }}" \
            "${{ needs.test.result }}" \
            "${{ needs.type-check.result }}"; do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              failed=true
            fi
          done

          if [ "$failed" = "true" ]; then
            echo "One or more checks failed. Review the logs above."
            exit 1
          else
            echo "All checks passed. Ready for review."
          fi
